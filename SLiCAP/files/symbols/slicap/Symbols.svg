<svg xmlns="http://www.w3.org/2000/svg">

  <defs>

    <g id="C"
       data-prefix="C" 
       data-nodes="pos neg"
       data-model="C|0" 
       data-params="value|?|0|1; vinit||0|0"
       data-description="Capacitor"
       data-info="https://www.slicap.org/syntax/devices.html#c-capacitor">

       <line x1="-7" y1="-2" x2="7" y2="-2" stroke="black" stroke-width="2"/>
       <line x1="-7" y1="2" x2="7" y2="2" stroke="black" stroke-width="2"/>
       <line x1="0" y1="-20" x2="0" y2="-2" stroke="black" stroke-width="1"/>
       <line x1="0" y1="2" x2="0" y2="20" stroke="black" stroke-width="1"/>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="pos" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="neg" />

    </g>

    <g id="L"
       data-prefix="L" 
       data-nodes="pos neg"
       data-model="L|0" 
       data-params="value|?|0|1; iinit||0|0"
       data-description="Inductor"
       data-info="https://www.slicap.org/syntax/devices.html#l-inductor">

       <!-- single path: lead + 3 right-side semicircular bumps + lead
            each arc: radius 4, clockwise sweep (0 0 1) passes through positive-x side -->
       <path d="M 0 -20 L 0 -12 A 4 4 0 0 1 0 -4 A 4 4 0 0 1 0  4 A 4 4 0 0 1 0  12 L 0 20"
             fill="none" stroke="black" stroke-width="1"/>
       <text x="5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="pos" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="neg" />
    </g>

    <g id="R"
       data-prefix="R" 
       data-nodes="pos neg"
       data-model="R|0" 
       data-params="value|?|0|1; dcvar||0|0; dcvarlot||0|0; noisetemp||0|0; noiseflow||0|0"
       data-description="Resistor (nonzero resistance)"
       data-info="https://www.slicap.org/syntax/devices.html#r-resistor">

       <rect x="-5" y="-10" width="10" height="20" fill="none" stroke="black" stroke-width="1"/>
       <line x1="0" y1="-20" x2="0" y2="-10" stroke="black" stroke-width="1"/>
       <line x1="0" y1="10" x2="0" y2="20" stroke="black" stroke-width="1"/>

       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="pos" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="neg" />
    </g>
    
    <g id="R0"
       data-prefix="R" 
       data-nodes="pos neg"
       data-model="r|0" 
       data-params="value|?|0|1; dcvar||0|0; dcvarlot||0|0; noisetemp||0|0; noiseflow||0|0"
       data-description="Resistor (finite resistance; includes zero)"
       data-info="https://www.slicap.org/syntax/devices.html#r-resistor">

       <rect x="-5" y="-10" width="10" height="20" fill="none" stroke="black" stroke-width="1"/>
       <line x1="0" y1="-20" x2="0" y2="-10" stroke="black" stroke-width="1"/>
       <line x1="0" y1="10" x2="0" y2="20" stroke="black" stroke-width="1"/>
       <text x="5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>

       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="pos" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="neg" />
    </g>

    <g id="V"
       data-prefix="V" 
       data-nodes="outp outn"
       data-model="V|0" 
       data-params="value|?|0|1; dc||0|0; dcvar||0|0; noise||0|0"
       data-description="Independent voltage source"
       data-info="https://www.slicap.org/syntax/devices.html#i-independent-voltage-source">

       <circle cx="0" cy="0" r="10" fill="none" stroke="black" stroke-width="1"/>
       <line x1="0" y1="-20" x2="0" y2="20" stroke="black" stroke-width="1"/>
       <text x="8" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="8" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="outn" />
    </g>

    <g id="I"
       data-prefix="I" 
       data-nodes="outp outn"
       data-model="I|0" 
       data-params="value|?|0|1; dc||0|0; dcvar||0|0; noise||0|0"
       data-description="Independent current source"
       data-info="https://www.slicap.org/syntax/devices.html#i-independent-current-source">

       <circle cx="0" cy="0" r="10" fill="none" stroke="black" stroke-width="1"/>
       <line x1="0" y1="-20" x2="0" y2="-10" stroke="black" stroke-width="1"/>
       <line x1="0" y1="20" x2="0" y2="10"  stroke="black" stroke-width="1"/>
       <line x1="-10" y1="0" x2="10" y2="0" stroke="black" stroke-width="1"/>
       <line x1="15" y1="-10" x2="15" y2="10" stroke="black" stroke-width="1"/>
       <polyline points="15 12 17 6 13 6 15 12" stroke="black" stroke-width="0" fill="black"/>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="outn" />
    </g>

    <g id="VCVS"
       data-prefix="E" 
       data-nodes="outp outn inp inn"
       data-model="E|0" 
       data-params="value|?|0|1"
       data-description="Voltage-controlled voltage source"
       data-info="https://www.slicap.org/syntax/devices.html#e-voltage-controlled-voltage-source">

       <line x1="10" y1="-20" x2="10" y2="20" stroke="black" stroke-width="1"/>
       <polyline points="10 10 0 0 10 -10 20 0 10 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="-20" y1="-20" x2="-10" y2="-20" stroke="black" stroke-width="1"/>
       <line x1="-20" y1="20" x2="-10" y2="20" stroke="black" stroke-width="1"/>
       <text x="-15" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="-15" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       <text x="15" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="15" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       
       <!-- Pins -->
       <circle cx="10" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-20" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-20" cy="20" r="0.5" class="node" data-node="inn" />
    </g>

    <g id="VCVS-Z"
       data-prefix="E" 
       data-nodes="outp outn inp inn"
       data-model="EZ|0" 
       data-params="value|?|0|1; zo|?|0|1"
       data-description="Voltage-controlled voltage source with finite output impedance"
       data-info="https://www.slicap.org/syntax/devices.html#e-voltage-controlled-voltage-source">

       <polyline points="20 -20 10 -20 10 20" stroke="black" stroke-width="1" fill="none" />
       <polyline points="10 10 0 0 10 -10 20 0 10 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="-20" y1="-20" x2="-10" y2="-20" stroke="black" stroke-width="1"/>
       <line x1="-20" y1="20" x2="-10" y2="20" stroke="black" stroke-width="1"/>
       <text x="-15" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="-15" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       <text x="15" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="15" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       <rect x="20" y="-25" width="20" height="10" fill="none" stroke="black" stroke-width="1"/>
       <line x1="40" y1="-20" x2="50" y2="-20" stroke="black" stroke-width="1"/>
       
       <!-- Pins -->
       <circle cx="50" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-20" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-20" cy="20" r="0.5" class="node" data-node="inn" />
    </g>

    <g id="CCCS"
       data-prefix="F" 
       data-nodes="outp outn"
       data-refs="V?"
       data-model="F|0" 
       data-params="value|?|0|1"
       data-description="Current-controlled current source"
       data-info="https://www.slicap.org/syntax/devices.html#f-current-controlled-current-source">

       <polyline points="0 10 10 0 0 -10 -10 0 0 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="0" y1="-20" x2="0" y2="-10" stroke="black" stroke-width="1"/>
       <line x1="0" y1="20" x2="0" y2="10" stroke="black" stroke-width="1"/>
       <line x1="-10" y1="0" x2="10" y2="0" stroke="black" stroke-width="1"/>
       <line x1="15" y1="-10" x2="15" y2="10" stroke="black" stroke-width="1"/>
       <polyline points="15 12 17 6 13 6 15 12" stroke="black" stroke-width="0" fill="black"/>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="outn" />
    </g>

    <g id="VCCS"
       data-prefix="G" 
       data-nodes="outp outn inp inn"
       data-model="G|0" 
       data-params="value|?|0|1"
       data-description="Voltage-controlled current source"
       data-info="https://www.slicap.org/syntax/devices.html#g-voltage-controlled-current-source">

       <line x1="10" y1="-20" x2="10" y2="-10" stroke="black" stroke-width="1"/>
       <line x1="10" y1="20" x2="10" y2="10" stroke="black" stroke-width="1"/>
       <line x1="0" y1="0" x2="20" y2="0" stroke="black" stroke-width="1"/>
       <polyline points="10 10 0 0 10 -10 20 0 10 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="-5" y1="-10" x2="-5" y2="10" stroke="black" stroke-width="1"/>
       <polyline points="-5 12 -3 6 -7 6 -5 12" stroke="black" stroke-width="0" fill="black"/>
       <line x1="-20" y1="-20" x2="-10" y2="-20" stroke="black" stroke-width="1"/>
       <line x1="-20" y1="20" x2="-10" y2="20" stroke="black" stroke-width="1"/>
       <text x="-15" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="-15" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       
       <!-- Pins -->
       <circle cx="10" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-20" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-20" cy="20" r="0.5" class="node" data-node="inn" />
    </g>

    <g id="CCVS"
       data-prefix="H" 
       data-nodes="outp outn"
       data-refs="V?"
       data-model="H|0" 
       data-params="value|?|0|1"
       data-description="Current-controlled voltage source"
       data-info="https://www.slicap.org/syntax/devices#model-h">

       <polyline points="0 10 10 0 0 -10 -10 0 0 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="0" y1="-20" x2="0" y2="20" stroke="black" stroke-width="1"/>
       <text x="5" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="5" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       
       <!-- Pins -->
       <circle cx="0" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="outn" />
    </g>

    <g id="CCVS-Z"
       data-prefix="H" 
       data-nodes="outp outn"
       data-refs="V?"
       data-model="HZ|0" 
       data-params="value|?|0|1; zo|?|0|1"
       data-description="Current-controlled voltage source with finite output impedance"
       data-info="https://www.slicap.org/syntax/devices#model-hz">

       <polyline points="10 -20 0 -20 0 20" stroke="black" stroke-width="1" fill="none" />
       <polyline points="0 10 10 0 0 -10 -10 0 0 10" stroke="black" stroke-width="1" fill="none" />
       <line x1="30" y1="-20" x2="40" y2="-20" stroke="black" stroke-width="1"/>
       <rect x="10" y="-25" width="20" height="10" fill="none" stroke="black" stroke-width="1"/>
       <text x="5" y="-12.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="5" y="12.4" dominant-baseline="middle" text-anchor="middle" font-size="8">-</text>
       
       <!-- Pins -->
       <circle cx="40" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="0" cy="20" r="0.5" class="node" data-node="outn" />
    </g>

    <g id="N"
       data-prefix="N" 
       data-nodes="outp outn inp inn"
       data-model="N|0" 
       data-description="Nullor"
       data-info="https://www.slicap.org/syntax/devices.html#n-nullor">
      
       <!-- norator -->
       <circle cx="10" cy="5" r="5" fill="none" stroke="black" stroke-width="1"/>
       <circle cx="10" cy="-5" r="5" fill="none" stroke="black" stroke-width="1"/>
       <polyline points="10 -20 10 -10" stroke="black" stroke-width="1" fill="none" />
       <polyline points=" 10 20 10 10" stroke="black" stroke-width="1" fill="none" />
       <text x="15" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
                
       <!-- nullator -->
       <ellipse cx="-10" cy="0" rx="5" ry="10" fill="none" stroke="black" stroke-width="1"/>
       <polyline points="-10 20 -10 10" stroke="black" stroke-width="1" fill="none" />
       <polyline points="-10 -20 -10 -10" stroke="black" stroke-width="1" fill="none" />
       
       <!-- Pins -->
       <circle cx="10" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-10" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-10" cy="20" r="0.5" class="node" data-node="inn" />
    </g>

    <g id="TR" 
       data-prefix="T" 
       data-nodes="outp outn inp inn"
       data-model="T|0" 
       data-params="value|?|0|1"
       data-description="Ideal transformer"
       data-info="https://www.slicap.org/syntax/devices.html#t-ideal-transformer">

       <polyline points="-10 -20 -10 -12 -3 -8 -10 -4 -3 0 -10 4 -3 8 -10 12 -10 20" stroke="black" stroke-width="1" fill="none" />      
       <polyline points="10 -20 10 -12 3 -8 10 -4 3 0 10 4 3 8 10 12 10 20" stroke="black" stroke-width="1" fill="none" />               
       <text x="-5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="-5" y="-24.2" dominant-baseline="middle" text-anchor="middle" font-size="7">1</text>
       <text x="0" y="-24.2" dominant-baseline="middle" text-anchor="middle" font-size="7">:</text>
       <text x="5" y="-24.2" dominant-baseline="middle" text-anchor="middle" font-size="7">n</text>
       
       <!-- Pins -->
       <circle cx="10" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-10" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-10" cy="20" r="0.5" class="node" data-node="inn" />
    </g>
    
    <g id="GY" 
       data-prefix="W" 
       data-nodes="outp outn inp inn"
       data-model="W|0" 
       data-params="value|?|0|1"
       data-description="Gyrator"
       data-info="https://www.slicap.org/syntax/devices.html#w-gyrator">

       <polyline points="-10 -20 -10 20" stroke="black" stroke-width="1" fill="none" />  
       <polyline points="10 -20 10 20" stroke="black" stroke-width="1" fill="none" />    
       <path d="M -10,-10 A 6 10 0 0 1 -10,10" fill="none" stroke="black" stroke-width="1" />
       <path d="M 10,10 A 6 10 0 0 1 10,-10" fill="none" stroke="black" stroke-width="1" />
              
       <text x="-5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="5" y="-15.6" dominant-baseline="middle" text-anchor="middle" font-size="8">+</text>
       <text x="0" y="-24.2" dominant-baseline="middle" text-anchor="middle" font-size="7">value</text>
       
       <!-- Pins -->
       <circle cx="10" cy="-20" r="0.5" class="node" data-node="outp" />
       <circle cx="10" cy="20" r="0.5" class="node" data-node="outn" />
       <circle cx="-10" cy="-20" r="0.5" class="node" data-node="inp" />
       <circle cx="-10" cy="20" r="0.5" class="node" data-node="inn" />
    </g>
    
    <g id="K"
       data-prefix="K"
       data-refs="L? L?"
       data-params="value|?|0|1"
       data-description="Mutual inductance coupling factor"
       data-info="https://www.slicap.org/syntax/devices.html#k-coupling-factor">

       <!-- Symbol outline -->
       <line x1="-10" y1="0" x2="10" y2="0" stroke="black" stroke-width="1"/>
       <polyline points="16 0 10 -2 10 2 16 0" stroke="black" stroke-width="0" fill="black"/>
       <polyline points="-16 0 -10 -2 -10 2 -16 0" stroke="black" stroke-width="0" fill="black"/>
    </g>
    
    <g id="0"
       data-prefix="GND" 
       data-nodes="0" 
       data-description="Reference node (GND=0) connection">

       <!-- connection node: (0, 0) -->
       <line x1="0" y1="0" x2="0" y2="5" stroke="black" stroke-width="1"/>
       <polyline points = "0 5 3 5 0 10 -3 5 0 5" stroke="black" stroke-width="1" fill="none" />
      
       <!-- Pins -->
       <circle cx="0" cy="0" r="0.5" class="node" data-node="0" />
    </g>

    <g id="port"
       data-prefix="P" 
       data-nodes="port" 
       data-description="Hierarchical connection">

       <!-- pentagon: pointed top at pin, rectangular body below -->
       <polyline points="0 0  5 5  5 20  -5 20  -5 5  0 0" fill="white" stroke="black" stroke-width="1"/>
       
       <!-- Pins -->
       <circle cx="0" cy="0" r="0.5" class="node" data-node="port" />
    </g>
</defs>
</svg>
